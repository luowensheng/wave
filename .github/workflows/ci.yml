name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test ./... -race -timeout 120s

  build-matrix:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - name: Cross build
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: '0' # cross builds skip CGO; sqlite-backed builds use the matrix in commands.yaml
        run: |
          mkdir -p dist
          ext=""
          if [ "${{ matrix.target.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -trimpath -tags=nosqlite -o dist/wave-${{ matrix.target.goos }}-${{ matrix.target.goarch }}${ext} ./orchestrator
      - uses: actions/upload-artifact@v4
        with:
          name: wave-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: dist/*
