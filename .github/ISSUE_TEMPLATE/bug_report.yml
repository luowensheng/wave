name: Bug report
description: Something works incorrectly or breaks
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail that a
        maintainer can reproduce it locally — vague reports get stuck.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did Wave do, and what did you expect it to do?
      placeholder: |
        I ran `wave serve foo.yaml --port 8080`, hit `POST /api/users`,
        and got a 500 error. I expected a 201 with the new row.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps + a server.yaml that reproduces it. The smaller, the faster we can fix it.
      placeholder: |
        ```yaml
        # server.yaml
        routes:
          - path: /api/users
            method: POST
            type: storage-access
            ...
        ```

        Steps:
        1. `wave serve server.yaml --port 8080`
        2. `curl -X POST -d '{"name":"x"}' http://localhost:8080/api/users`
        3. Returns 500 with body: `...`
      render: markdown
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Wave version
      description: Output of `wave version`
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / arch
      placeholder: "macOS 14 arm64, Ubuntu 22.04 amd64, Windows 11 amd64"
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version (if building from source)
      placeholder: "go1.24.1"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste the server log output around the failure. Trim huge dumps.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
        - label: I can reproduce this on a fresh clone of the latest `main`
          required: false
