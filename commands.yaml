name: Commands
global:
  OUTPUT_DIR: "{{CWD}}/.ignore"

commands:

  build:
    args:
      os:
        type: string
      arch:
        type: string
      output:
        type: string

    script: |
        set -e
        cd "{{CWD}}/orchestrator"
        export CC="{{if and (eq .os `windows`) (eq .arch `amd64`)}}zig cc -target x86_64-windows-gnu{{else if and (eq .os `linux`) (eq .arch `amd64`)}}zig cc -target x86_64-linux-gnu{{else if and (eq .os `linux`) (eq .arch `arm64`)}}zig cc -target aarch64-linux-gnu{{else if and (eq .os `darwin`) (eq .arch `arm64`)}}clang{{end}}"


        export GOOS="{{.os}}"
        export GOARCH="{{.arch}}"
        export CGO_ENABLED="1"

        go build -o "{{.output}}"

  build_windows:
    script: |
      {{Run}} build --os windows --arch amd64 --output "{{.OUTPUT_DIR}}/builds/windows/wave"

  build_mac:
    script: |
      {{Run}} build --os darwin --arch arm64 --output "{{.OUTPUT_DIR}}/builds/mac/wave"
      # bman remove wave
      bman add "{{.OUTPUT_DIR}}/builds/mac/wave"

  build_linux:
    script: |
      {{Run}} build --os linux --arch amd64 --output "{{.OUTPUT_DIR}}/builds/linux/wave"

  build_linux-arm:
    script: |
      {{Run}} build --os linux --arch arm64 --output "{{.OUTPUT_DIR}}/builds/linux-arm/wave"

  build_all:
    script: |
     # {{Run}} build_windows
      {{Run}} build_mac
      {{Run}} build_linux
      {{Run}} build_linux-arm

  merge:
    script: |
      functool merge --ignore "*test*,*sample*,*dependencies*,*pkg*,*builds*" "*.go" merge.txt "// {filepath}"