# multi-tenant-saas — derive the tenant from the request Host header
# and scope every storage query by tenant_id.
#
# Now uses the `Host` special-case in the inputs layer (source: header,
# from: Host pulls from r.Host, not r.Header which Go strips). Hit with:
#   curl -H 'Host: tenant-a.localhost' http://127.0.0.1:8602/notes
#   curl -H 'Host: tenant-b.localhost' http://127.0.0.1:8602/notes
#
#   wave serve examples/apps/multi-tenant-saas/server.yaml --port 8602

default:
  host: 127.0.0.1
  port: 8602

storage:
  notes:
    type: sqlite
    path: ./data/multi.db
    tables:
      notes:
        columns:
          - id INTEGER PRIMARY KEY AUTOINCREMENT
          - tenant_id TEXT NOT NULL
          - body TEXT NOT NULL
          - created_at TEXT NOT NULL DEFAULT (datetime('now'))

routes:
  - path: /notes
    method: GET
    type: storage-access
    inputs:
      - { name: tenant_id, source: header, from: Host, type: string, required: true, pattern: "^[a-z0-9-]+\\.localhost.*" }
    storage-access:
      source: notes
      execute: "SELECT id, body, created_at FROM notes WHERE tenant_id = {{tenant_id}} ORDER BY id DESC"
      response_content_type: application/json
      output_template: "{{toJSON .Data}}"

  - path: /notes
    method: POST
    type: storage-access
    expected_content_type: application/json
    inputs:
      - { name: tenant_id, source: header, from: Host,   type: string, required: true, pattern: "^[a-z0-9-]+\\.localhost.*" }
      - { name: body,      source: body,                 type: string, required: true, min: 1, max: 1000 }
    storage-access:
      source: notes
      execute: "INSERT INTO notes(tenant_id, body) VALUES ({{tenant_id}}, {{body}})"
      response_content_type: application/json
      output_template: '{"id": {{.LastInsertID}}}'
