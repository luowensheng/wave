# file-uploads — multipart upload to a filesystem-backed storage,
# with a sqlite "uploads" table tracking per-file metadata.
#
# Uses the inputs layer's `type: file` + `expected_content_type:
# multipart/form-data` to accept the upload in a single route, then
# writes both the bytes (filesystem backend) and the metadata row
# (sqlite backend) declaratively.
#
#   wave serve examples/apps/file-uploads/server.yaml --port 8106

default:
  host: 127.0.0.1
  port: 8106

storage:
  blobs:
    type: filesystem
    path: ./data/uploads

  meta:
    type: sqlite
    path: ./data/meta.db
    tables:
      uploads:
        columns:
          - id INTEGER PRIMARY KEY AUTOINCREMENT
          - filename TEXT NOT NULL
          - size     INTEGER NOT NULL
          - content_type TEXT
          - created_at TEXT NOT NULL DEFAULT (datetime('now'))

routes:
  # Single upload route — the request is multipart/form-data with one
  # file field named `file`. The bytes go to disk via the filesystem
  # storage backend's WRITE template helper; the metadata row is
  # captured separately via /upload-meta below.
  - path: /upload-blob
    method: POST
    type: storage-access
    expected_content_type: multipart/form-data
    inputs:
      - { name: file, source: body, type: file, required: true }
    storage-access:
      source: blobs
      execute: '{{ WRITE (GET_FILE "file") (GET_FILE "file").Filename }}'
      response_content_type: application/json
      output_template: '{"ok": true}'

  - path: /upload-meta
    method: POST
    type: storage-access
    expected_content_type: application/json
    inputs:
      - { name: filename,     source: body, type: string, required: true }
      - { name: size,         source: body, type: int,    required: true }
      - { name: content_type, source: body, type: string, default: "application/octet-stream" }
    storage-access:
      source: meta
      execute: |
        INSERT INTO uploads(filename, size, content_type)
        VALUES ({{filename}}, {{size}}, {{content_type}})
      response_content_type: application/json
      output_template: '{"id": {{.LastInsertID}}}'

  - path: /files
    method: GET
    type: storage-access
    storage-access:
      source: meta
      execute: "SELECT id, filename, size, content_type, created_at FROM uploads ORDER BY id DESC"
      response_content_type: application/json
      output_template: "{{toJSON .Data}}"

  - path: /files/by-name/{name}
    method: GET
    type: storage-access
    inputs:
      - { name: name, source: path, type: string, required: true }
    storage-access:
      source: blobs
      execute: '{{ READ (GET_VALUE "name") "file" }}'
      response_content_type: $filetype
