# kv-store — generic key/value HTTP API.
#
# Demonstrates raw-body input capture (`source: body_raw, type: bytes`)
# and the new `if_empty_status: 404` so missing keys return a clean
# 404 instead of a fake 200/null.
#
#   wave serve examples/apps/kv-store/server.yaml --port 8105

default:
  host: 127.0.0.1
  port: 8105

storage:
  kv:
    type: sqlite
    path: ./data/kv.db
    tables:
      kv:
        columns:
          - k TEXT PRIMARY KEY
          - v BLOB NOT NULL

routes:
  - path: /kv/{key}
    method: PUT
    type: storage-access
    expected_content_type: text/plain
    inputs:
      - { name: key,   source: path,     type: string, required: true }
      - { name: value, source: body_raw, type: bytes,  required: true }
    storage-access:
      source: kv
      execute: |
        INSERT INTO kv(k, v) VALUES ({{key}}, {{value}})
        ON CONFLICT(k) DO UPDATE SET v = excluded.v
      response_content_type: application/json
      output_template: '{"ok": true}'

  - path: /kv/{key}
    method: GET
    type: storage-access
    inputs:
      - { name: key, source: path, type: string, required: true }
    storage-access:
      source: kv
      execute: "SELECT v FROM kv WHERE k = {{key}}"
      if_empty_status: 404
      response_content_type: application/octet-stream
      output_template: "{{ (index .Data 0).v }}"

  - path: /kv/{key}
    method: DELETE
    type: storage-access
    inputs:
      - { name: key, source: path, type: string, required: true }
    storage-access:
      source: kv
      execute: "DELETE FROM kv WHERE k = {{key}}"
      response_content_type: application/json
      output_template: '{"deleted": {{.RowsAffected}}}'
